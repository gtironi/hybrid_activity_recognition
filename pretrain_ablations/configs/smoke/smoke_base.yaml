run_name: "smoke"
seed: 42
device: "cpu"
output_root: "pretrain_ablations/runs"

data:
  dataset_id: "har_tfc"
  registry_path: "pretrain_ablations/dataset_registry.yaml"
  batch_size: 8
  num_workers: 0
  normalize: true
  channel_policy: "first_only"

encoder:
  name: "cnn_tfc"
  d_model: 64
  kernel_size: 8
  stride: 1
  final_out_channels: 64
  cnn_dropout: 0.35
  base_channels: 32
  num_blocks: 2
  patch_length: 8
  patch_stride: 8
  num_heads: 2
  num_layers: 2
  dropout: 0.1

pretext:
  method: "supervised"
  epochs: 1
  lr: 1e-3
  weight_decay: 1e-4
  grad_clip: 1.0
  temperature: 0.2
  projection_dim: 64
  mask_ratio: 0.4
  tfc_lambda: 0.2
  tstcc_lambda: 0.5
  jitter_sigma: 0.3
  scale_sigma: 0.1
  permutation_max_segs: 5
  freq_remove_ratio: 0.1
  freq_add_ratio: 0.1
  collapse_check_every: 1
  collapse_knn_k: 3
  collapse_max_samples: 100

finetune:
  mode: "full"
  epochs: 1
  lr: 1e-3
  encoder_lr_factor: 0.1
  partial_k: 1
  weight_decay: 1e-4
  grad_clip: 1.0
  class_weights: false
  early_stopping_patience: 5
  scheduler_patience: 3
  scheduler_factor: 0.5

head:
  name: "mlp"
  hidden_dim: 64
  num_layers: 2
  dropout: 0.3

eval:
  tsne_max_points: 50
  tsne_perplexity: 5
  tsne_seed: 42
  save_embeddings: true
